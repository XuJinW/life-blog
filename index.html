<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生活拾贝 | 随笔博客</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
       <!-- 全屏背景容器 -->
    <div class="bg-container" id="bgContainer"></div>

    <!-- 主内容区（加半透背景，提高可读性） -->
    <div class="content-overlay">
        <div class="container">
            <!-- 动态文案区域 -->
            <div class="hero-text" id="heroText"></div>
        <header>
            <h1>📝 生活拾贝</h1>
            <p>一些随手记下的日常与思绪</p>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索文章...">
            </div>
        </header>

        <main id="postsList">
            <!-- 文章列表将由 js 动态渲染 -->
            <div class="loading">加载中...</div>
        </main>

        <footer>
            <p>© 2026 生活拾贝 · 用文字留住时光</p>
        </footer>
       </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
